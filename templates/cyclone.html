<!-- ================= cyclone.html ================= -->
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyclone</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="center">

<div class="form-box {% if theme %}{{ theme }}{% endif %}">
    <div class="form-title">🌪 Cyclone Risk Predictor</div>

    <form action="/predict_cyclone" method="POST">
      <div class="form-group"><label>Latitude</label><input type="number" name="latitude" required step="any"></div>
      <div class="form-group"><label>Longitude</label><input type="number" name="longitude" required step="any"></div>
      <div class="form-group"><label>Sea Surface Temp (°C)</label><input type="number" name="sea_surface_temp_C" required step="any"></div>
      <div class="form-group"><label>Humidity (%)</label><input type="number" name="humidity_percent" required step="any"></div>
      <div class="form-group"><label>Pressure (hPa)</label><input type="number" name="pressure_hPa" required step="any"></div>
      <div class="form-group"><label>Wind Speed (km/h)</label><input type="number" name="wind_speed_kmph" required step="any"></div>
      <button type="submit" class="btn">Predict Cyclone Risk</button>
    </form>

    {% if result %}
      <h3 style="margin-top: 20px; text-align: center; font-weight: bold; color: {% if 'Safe' not in result %}#fb7185{% else %}#a3e635{% endif %};">{{ result }}</h3>

      <div class="reason-box {% if 'Safe' in result %}safe{% endif %}">
        <h4><i class="fas fa-microchip"></i> AI Factor Analysis:</h4>
        <ul>
          {% for reason in reasons %}<li>{{ reason }}</li>{% endfor %}
        </ul>
      </div>
    {% endif %}

    <div style="text-align: center; margin-top: 20px; cursor: pointer; color: #cbd5f5; font-size: 14px;" onclick="window.location.href='/'">⬅ Back to Home</div>
  </div>

</body>
</html>
