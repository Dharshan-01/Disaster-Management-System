<!-- ================= earthquake.html ================= -->
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earthquake</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="center">

<div class="form-box {% if theme %}{{ theme }}{% endif %}">
    <div class="form-title">🌍 Earthquake Risk Predictor</div>

    <form action="/predict_earthquake" method="POST">
      <div class="form-group"><label>Latitude</label><input type="number" name="latitude" required step="any"></div>
      <div class="form-group"><label>Longitude</label><input type="number" name="longitude" required step="any"></div>
      <div class="form-group"><label>Depth (km)</label><input type="number" name="depth_km" required step="any"></div>
      <div class="form-group"><label>Magnitude</label><input type="number" name="magnitude" required step="any"></div>
      <div class="form-group"><label>Fault Distance (km)</label><input type="number" name="fault_distance_km" required step="any"></div>
      <div class="form-group"><label>Seismic Frequency</label><input type="number" name="seismic_frequency" required step="any"></div>
      <div class="form-group"><label>Micro Tremors</label><input type="number" name="micro_tremors" required step="any"></div>
      <div class="form-group"><label>Plate Movement (mm/yr)</label><input type="number" name="plate_movement" required step="any"></div>
      <button type="submit" class="btn">Predict Earthquake Risk</button>
    </form>

    {% if result %}
      <h3 style="margin-top: 20px; text-align: center; font-weight: bold; color: {% if 'Safe' not in result %}#fb7185{% else %}#a3e635{% endif %};">{{ result }}</h3>

      <div class="reason-box {% if 'Safe' in result %}safe{% endif %}">
        <h4><i class="fas fa-microchip"></i> AI Factor Analysis:</h4>
        <ul>
          {% for reason in reasons %}<li>{{ reason }}</li>{% endfor %}
        </ul>
      </div>
    {% endif %}

    <div style="text-align: center; margin-top: 20px; cursor: pointer; color: #cbd5f5; font-size: 14px;" onclick="window.location.href='/'">⬅ Back to Home</div>
  </div>

</body>
</html>
