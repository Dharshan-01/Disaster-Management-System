<!-- ================= flood.html ================= -->
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flood</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="center">

<div class="form-box {% if theme %}{{ theme }}{% endif %}">
    <div class="form-title">🌊 Flood Risk Predictor</div>

    <form action="/predict_flood" method="POST">
      <div class="form-group"><label>Rainfall (mm)</label><input type="number" name="Rainfall_mm" required step="any" placeholder="e.g. 120"></div>
      <div class="form-group"><label>River Level (m)</label><input type="number" name="River_Level_m" required step="any" placeholder="e.g. 6.5"></div>
      <div class="form-group"><label>Humidity (%)</label><input type="number" name="Humidity_pct" required step="any" placeholder="e.g. 85"></div>
      <div class="form-group"><label>Temperature (°C)</label><input type="number" name="Temperature_C" required step="any" placeholder="e.g. 26"></div>
      <div class="form-group"><label>Soil Moisture (%)</label><input type="number" name="Soil_Moisture_pct" required step="any" placeholder="e.g. 75"></div>
      <div class="form-group"><label>Wind Speed (km/h)</label><input type="number" name="Wind_Speed_kmph" required step="any" placeholder="e.g. 15"></div>
      <button type="submit" class="btn">Predict Flood Risk</button>
    </form>

    {% if result %}
      <h3 style="margin-top: 20px; text-align: center; font-weight: bold; color: {% if 'Safe' not in result %}#fb7185{% else %}#a3e635{% endif %};">{{ result }}</h3>

      <div class="reason-box {% if 'Safe' in result %}safe{% endif %}">
        <h4><i class="fas fa-microchip"></i> AI Factor Analysis:</h4>
        <ul>
          {% for reason in reasons %}<li>{{ reason }}</li>{% endfor %}
        </ul>
      </div>
    {% endif %}

    <div style="text-align: center; margin-top: 20px; cursor: pointer; color: #cbd5f5; font-size: 14px;" onclick="window.location.href='/'">⬅ Back to Home</div>
  </div>

</body>
</html>
