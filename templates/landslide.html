<!-- ================= landslide.html ================= -->
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landslide</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="center">

<div class="form-box {% if theme %}{{ theme }}{% endif %}">
    <div class="form-title">⛰ Landslide Risk Predictor</div>

    <form action="/predict_landslide" method="POST">
      <div class="form-group"><label>Rainfall (mm)</label><input type="number" name="Rainfall_mm" required step="any" placeholder="e.g. 150"></div>
      <div class="form-group"><label>Slope Angle (°)</label><input type="number" name="Slope_Angle" required step="any" placeholder="e.g. 35"></div>
      <div class="form-group">
        <label>Soil Type</label>
        <select name="Soil_Type" required style="width: 100%; padding: 8px;">
          <option value="Gravel">Gravel</option>
          <option value="Sand">Sand</option>
          <option value="Silt">Silt</option>
        </select>
      </div>
      <button type="submit" class="btn">Predict Landslide Risk</button>
    </form>

    {% if result %}
      <h3 style="margin-top: 20px; text-align: center; font-weight: bold; color: {% if 'Safe' not in result %}#fb7185{% else %}#a3e635{% endif %};">{{ result }}</h3>

      <div class="reason-box {% if 'Safe' in result %}safe{% endif %}">
        <h4><i class="fas fa-microchip"></i> AI Factor Analysis:</h4>
        <ul>
          {% for reason in reasons %}<li>{{ reason }}</li>{% endfor %}
        </ul>
      </div>
    {% endif %}

    <div style="text-align: center; margin-top: 20px; cursor: pointer; color: #cbd5f5; font-size: 14px;" onclick="window.location.href='/'">⬅ Back to Home</div>
  </div>

</body>
</html>
