<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Disaster Management</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="center" style="padding-top: 10vh;">

  <div class="form-box" style="max-width: 400px; width: 100%;">
    <div class="form-title" style="color: #38bdf8;">
      <i class="fas fa-user-shield"></i> Admin Portal
    </div>
    
    <p style="text-align: center; color: #cbd5f5; font-size: 14px; margin-bottom: 20px;">
      Restricted access for Emergency Response Officials.
    </p>

    <form action="/login" method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required placeholder="Enter admin username" style="background: rgba(0,0,0,0.3);">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Enter secure password" style="background: rgba(0,0,0,0.3);">
      </div>

      {% if error %}
        <div style="color: #fb7185; text-align: center; margin-bottom: 15px; font-weight: bold; background: rgba(251, 113, 133, 0.1); padding: 10px; border-radius: 5px; border: 1px solid rgba(251, 113, 133, 0.3);">
          <i class="fas fa-exclamation-triangle"></i> {{ error }}
        </div>
      {% endif %}

      <button type="submit" class="btn" style="margin-top: 10px;">Login Securely</button>
    </form>

    <div style="text-align: center; margin-top: 25px; cursor: pointer; color: #a3e635; font-size: 14px; transition: 0.3s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#a3e635'" onclick="window.location.href='/'">
      ⬅ Continue as Normal User
    </div>
  </div>

</body>
</html>
