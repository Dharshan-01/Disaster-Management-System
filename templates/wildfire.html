<!-- ================= wildfire.html ================= -->
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wildfire</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="center">

<div class="form-box {% if theme %}{{ theme }}{% endif %}">
    <div class="form-title">🔥 Wildfire Risk Predictor</div>

    <form action="/predict_wildfire" method="POST">
      <div class="form-group"><label>Temperature (°C)</label><input type="number" name="Temperature" required step="any" placeholder="e.g. 35"></div>
      <div class="form-group"><label>Relative Humidity (%)</label><input type="number" name="RH" required step="any" placeholder="e.g. 25"></div>
      <div class="form-group"><label>Wind Speed (km/h)</label><input type="number" name="Ws" required step="any" placeholder="e.g. 20"></div>
      <div class="form-group"><label>Rainfall (mm)</label><input type="number" name="Rain" required step="any" placeholder="e.g. 0"></div>
      <button type="submit" class="btn">Predict Wildfire Risk</button>
    </form>

    {% if result %}
      <h3 style="margin-top: 20px; text-align: center; font-weight: bold; color: {% if 'HIGH RISK' in result %}#fb7185{% else %}#a3e635{% endif %};">{{ result }}</h3>

      <div class="reason-box {% if 'Safe' in result %}safe{% endif %}">
        <h4><i class="fas fa-microchip"></i> AI Factor Analysis:</h4>
        <ul>
          {% for reason in reasons %}
            <li>{{ reason }}</li>
          {% endfor %}
        </ul>
      </div>
    {% endif %}

    <div style="text-align: center; margin-top: 20px; cursor: pointer; color: #cbd5f5; font-size: 14px;" onclick="window.location.href='/'">
      ⬅ Back to Home
    </div>
  </div>

</body>
</html>
